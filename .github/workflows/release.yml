name: Release

# Trigger on pushes to main that change the version in Cargo.toml.
# The version bump commit comes from merging the release PR.
# Also supports manual trigger via workflow_dispatch.
on:
  push:
    branches:
      - main
    paths:
      - 'Cargo.toml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  # All working features (excludes persistence — requires C++ toolchain)
  FEATURES: "parallel,serde,async,optical"

jobs:
  # Run all checks before releasing
  check:
    name: Pre-release Checks
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: v$VERSION"

      - name: Check if release already exists
        id: check_release
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" &>/dev/null; then
            echo "Release v${{ steps.version.outputs.version }} already exists, skipping."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Check formatting
        if: steps.check_release.outputs.exists != 'true'
        run: cargo fmt --all -- --check

      - name: Run clippy
        if: steps.check_release.outputs.exists != 'true'
        run: cargo clippy --features "$FEATURES" -- -D warnings

      - name: Run tests
        if: steps.check_release.outputs.exists != 'true'
        run: cargo test --features "$FEATURES"

      - name: Build documentation
        if: steps.check_release.outputs.exists != 'true'
        run: cargo doc --no-deps --features "$FEATURES"
        env:
          RUSTDOCFLAGS: -Dwarnings

  # Create git tag and GitHub release
  release:
    name: Create GitHub Release
    needs: check
    if: needs.check.outputs.version != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ needs.check.outputs.version }}" -m "Minuet v${{ needs.check.outputs.version }}"
          git push origin "v${{ needs.check.outputs.version }}"

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          # Extract the section for this version from CHANGELOG.md
          CHANGELOG=$(awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.check.outputs.version }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.changelog }}

            ## Installation

            ```toml
            [dependencies]
            minuet = "${{ needs.check.outputs.version }}"
            ```

            See the [documentation](https://docs.rs/minuet) for usage examples.
          draft: false
          prerelease: false
