name: Publish

# Manual trigger — publish to crates.io after a GitHub release is created.
# This is invoked from the Actions tab with the version as input.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.3.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2

      - name: Verify version
        run: |
          CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          if [ "$CARGO_VERSION" != "${{ inputs.version }}" ]; then
            echo "Error: Cargo.toml version ($CARGO_VERSION) does not match input (${{ inputs.version }})"
            exit 1
          fi
          echo "Publishing Minuet v$CARGO_VERSION"

      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
